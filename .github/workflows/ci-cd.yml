name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build Backend
        run: mvn clean package -DskipTests

      - name: Login To Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/meetup-backend:latest -t ${{ secrets.DOCKER_USERNAME }}/meetup-backend:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/meetup-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/meetup-backend:${{ github.sha }}

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ReactFrontend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build Frontend
        run: npm run build

      - name: Login To Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Frontend Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/meetup-frontend:latest -t ${{ secrets.DOCKER_USERNAME }}/meetup-frontend:${{ github.sha }} .

      - name: Push Frontend Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/meetup-frontend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/meetup-frontend:${{ github.sha }}
